<!DOCTYPE html>
<html>
<head>
  <title>Trading Desk Pro</title>
  <style>
    body {
      background: transparent;
      font-family: Arial;
    }

    .box {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
    }

    .buy { color: lime; }
    .sell { color: red; }
  </style>
</head>

<body>

<div class="box" id="box">
  WAITING SIGNAL...
</div>

<script>
async function load() {
  const res = await fetch("http://localhost:3000/signal");
  const data = await res.json();

  if (!data) return;

  document.getElementById("box").innerHTML = `
    <div class="${data.signal === 'BUY' ? 'buy' : 'sell'}">
      ${data.signal}
    </div>
    <div>${data.pair}</div>
    <div>${data.score}%</div>
    <div>${data.mode}</div>
  `;
}

setInterval(load, 2000);
</script>

</body>
</html>
